# Local development: PostgreSQL only (backend + frontend run on the host)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - clinic_db_data:/var/lib/postgresql/data

volumes:
  clinic_db_data:
