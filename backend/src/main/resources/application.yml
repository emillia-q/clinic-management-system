spring:
  application:
    name: "TAB przychodnia"

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT_EXTERNAL}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: przychodnia
        hbm2ddl:
          create_namespaces: true

server:
  port: ${APP_PORT}